<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iris</title>
<style>
  :root {
    --bg: #0e1117;
    --panel: #161b24;
    --accent: #5fb4ff;
    --text: #e6e9ef;
    --muted: #8b97a8;
    --good: #4caf78;
    --border: #2a3140;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "SF Pro Text", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 {
    font-size: 20px;
    margin: 0;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  header h1 span { color: var(--accent); }
  .mode-switch {
    display: flex;
    gap: 8px;
  }
  .mode-switch button {
    background: var(--panel);
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .mode-switch button.active {
    background: var(--accent);
    color: #04101c;
    border-color: var(--accent);
    font-weight: 600;
  }
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: auto;
  }
  .panel {
    width: 100%;
    max-width: 520px;
    display: none;
    flex-direction: column;
    gap: 16px;
  }
  .panel.active { display: flex; }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .card h2 {
    margin: 0 0 12px 0;
    font-size: 15px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  input[type="file"] {
    width: 100%;
    color: var(--text);
    margin-bottom: 12px;
  }
  button.primary {
    background: var(--accent);
    color: #04101c;
    border: none;
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }
  button.primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  button.secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 14px;
    cursor: pointer;
  }
  .qr-display {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .qr-display img {
    width: 320px;
    height: 320px;
    background: white;
    border-radius: 8px;
    image-rendering: pixelated;
  }
  .frame-info {
    font-size: 14px;
    color: var(--muted);
    text-align: center;
  }
  .controls-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    align-items: center;
  }
  .speed-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--muted);
  }
  .speed-row input[type="range"] { flex: 1; }
  video, canvas {
    width: 100%;
    border-radius: 8px;
    background: #000;
  }
  canvas.hidden { display: none; }
  .progress-wrap {
    margin-top: 12px;
  }
  .progress-bar {
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.2s;
  }
  .progress-fill.done { background: var(--good); }
  .status-text {
    margin-top: 10px;
    font-size: 14px;
    color: var(--muted);
    text-align: center;
  }
  .status-text.done { color: var(--good); font-weight: 600; }
</style>
</head>
<body>

<header>
  <h1>Ir<span>is</span></h1>
  <div class="mode-switch">
    <button id="btn-send" class="active">Send</button>
    <button id="btn-receive">Receive</button>
  </div>
</header>

<main>

  <!-- SEND PANEL -->
  <div id="panel-send" class="panel active">
    <div class="card">
      <h2>1. Choose File</h2>
      <input type="file" id="file-input">
      <button class="primary" id="btn-generate">Generate QR Sequence</button>
    </div>

    <div class="card qr-display" id="qr-card" style="display:none;">
      <h2 style="align-self:flex-start;">2. Display To Receiver</h2>
      <img id="qr-image" src="" alt="QR code">
      <div class="frame-info" id="frame-info">Frame 0 / 0</div>
      <div class="controls-row">
        <button class="secondary" id="btn-playpause">Pause</button>
        <button class="secondary" id="btn-restart">Restart</button>
      </div>
      <div class="speed-row">
        <span>Speed</span>
        <input type="range" id="speed-slider" min="100" max="1000" step="50" value="350">
        <span id="speed-label">350ms</span>
      </div>
    </div>
  </div>

  <!-- RECEIVE PANEL -->
  <div id="panel-receive" class="panel">
    <div class="card">
      <h2>Scan</h2>
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas" class="hidden"></canvas>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      </div>
      <div class="status-text" id="status-text">Point camera at the sending screen.</div>
    </div>
  </div>

</main>

<script src="/static/jsQR.js"></script>
<script>
// ---------- Mode switching ----------
const btnSend = document.getElementById('btn-send');
const btnReceive = document.getElementById('btn-receive');
const panelSend = document.getElementById('panel-send');
const panelReceive = document.getElementById('panel-receive');

btnSend.addEventListener('click', () => {
  btnSend.classList.add('active');
  btnReceive.classList.remove('active');
  panelSend.classList.add('active');
  panelReceive.classList.remove('active');
  stopCamera();
});

btnReceive.addEventListener('click', () => {
  btnReceive.classList.add('active');
  btnSend.classList.remove('active');
  panelReceive.classList.add('active');
  panelSend.classList.remove('active');
  startCamera();
});

// ---------- SEND LOGIC ----------
const fileInput = document.getElementById('file-input');
const btnGenerate = document.getElementById('btn-generate');
const qrCard = document.getElementById('qr-card');
const qrImage = document.getElementById('qr-image');
const frameInfo = document.getElementById('frame-info');
const btnPlayPause = document.getElementById('btn-playpause');
const btnRestart = document.getElementById('btn-restart');
const speedSlider = document.getElementById('speed-slider');
const speedLabel = document.getElementById('speed-label');

let frames = [];
let currentFrame = 0;
let playing = true;
let intervalMs = 350;
let timer = null;

btnGenerate.addEventListener('click', async () => {
  const file = fileInput.files[0];
  if (!file) {
    alert('Choose a file first.');
    return;
  }
  btnGenerate.disabled = true;
  btnGenerate.textContent = 'Encoding...';

  const formData = new FormData();
  formData.append('file', file);

  try {
    const resp = await fetch('/api/prepare', { method: 'POST', body: formData });
    const data = await resp.json();
    if (data.error) {
      alert('Error: ' + data.error);
      return;
    }
    frames = data.frames;
    currentFrame = 0;
    qrCard.style.display = 'flex';
    startLoop();
  } catch (e) {
    alert('Failed to encode file: ' + e);
  } finally {
    btnGenerate.disabled = false;
    btnGenerate.textContent = 'Generate QR Sequence';
  }
});

function showFrame() {
  if (frames.length === 0) return;
  qrImage.src = frames[currentFrame];
  frameInfo.textContent = `Frame ${currentFrame} / ${frames.length - 1}`;
}

function startLoop() {
  stopLoop();
  showFrame();
  timer = setInterval(() => {
    currentFrame = (currentFrame + 1) % frames.length;
    showFrame();
  }, intervalMs);
  playing = true;
  btnPlayPause.textContent = 'Pause';
}

function stopLoop() {
  if (timer) clearInterval(timer);
  timer = null;
}

btnPlayPause.addEventListener('click', () => {
  if (playing) {
    stopLoop();
    btnPlayPause.textContent = 'Play';
    playing = false;
  } else {
    startLoop();
  }
});

btnRestart.addEventListener('click', () => {
  currentFrame = 0;
  showFrame();
  if (!playing) {
    // leave paused on frame 0
  }
});

speedSlider.addEventListener('input', () => {
  intervalMs = parseInt(speedSlider.value, 10);
  speedLabel.textContent = intervalMs + 'ms';
  if (playing) startLoop();
});

// ---------- RECEIVE LOGIC ----------
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const progressFill = document.getElementById('progress-fill');
const statusText = document.getElementById('status-text');

let stream = null;
let scanTimer = null;

// Transfer state
let activeFileId = null;
let activeFilename = null;
let activeTotal = 0;
let receivedChunks = {}; // index -> base64 chunk
let metaReceived = false;
let saved = false;

async function startCamera() {
  if (stream) return;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
  } catch (e) {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: true });
    } catch (e2) {
      statusText.textContent = 'Camera access denied: ' + e2.message;
      return;
    }
  }
  video.srcObject = stream;
  resetTransferState();
  scanTimer = setInterval(scanFrame, 150);
}

function stopCamera() {
  if (scanTimer) clearInterval(scanTimer);
  scanTimer = null;
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
}

function resetTransferState() {
  activeFileId = null;
  activeFilename = null;
  activeTotal = 0;
  receivedChunks = {};
  metaReceived = false;
  saved = false;
  progressFill.style.width = '0%';
  progressFill.classList.remove('done');
  statusText.textContent = 'Point camera at the sending screen.';
  statusText.classList.remove('done');
}

function scanFrame() {
  if (!video.videoWidth || saved) return;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const code = jsQR(imageData.data, imageData.width, imageData.height);

  if (!code) return;
  handlePayload(code.data);
}

function handlePayload(payload) {
  const parts = payload.split('|');
  const tag = parts[0];

  if (tag === 'IRISMETA') {
    const [, fileId, total, filename] = parts;
    if (activeFileId && activeFileId !== fileId) {
      // new transfer started, reset
      resetTransferState();
    }
    activeFileId = fileId;
    activeTotal = parseInt(total, 10);
    activeFilename = filename;
    metaReceived = true;
  } else if (tag === 'IRISDATA') {
    const fileId = parts[1];
    const idx = parseInt(parts[2], 10);
    const chunk = parts[3];

    if (activeFileId && activeFileId !== fileId) {
      resetTransferState();
    }
    activeFileId = fileId;
    receivedChunks[idx] = chunk;
  } else {
    return; // not an Iris frame
  }

  updateProgress();
}

function updateProgress() {
  const receivedCount = Object.keys(receivedChunks).length;

  if (activeTotal > 0) {
    const pct = Math.min(100, Math.round((receivedCount / activeTotal) * 100));
    progressFill.style.width = pct + '%';
    statusText.textContent = `Receiving "${activeFilename || ''}"... ${receivedCount} / ${activeTotal} frames`;
  } else {
    statusText.textContent = `Receiving... ${receivedCount} frames (waiting for header)`;
  }

  if (metaReceived && activeTotal > 0 && receivedCount === activeTotal && !saved) {
    completeTransfer();
  }
}

async function completeTransfer() {
  saved = true;
  statusText.textContent = `Saving "${activeFilename}"...`;

  let combined = '';
  for (let i = 0; i < activeTotal; i++) {
    combined += receivedChunks[i];
  }

  try {
    const resp = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filename: activeFilename, data: combined })
    });
    const result = await resp.json();
    if (result.error) {
      statusText.textContent = 'Error saving: ' + result.error;
      saved = false;
      return;
    }
    progressFill.classList.add('done');
    statusText.classList.add('done');
    statusText.textContent = `Saved to ${result.path}`;
  } catch (e) {
    statusText.textContent = 'Save failed: ' + e;
    saved = false;
  }
}
</script>

</body>
</html>
